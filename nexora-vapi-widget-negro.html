<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prueba el Agente</title>
<style>
body { margin:0; padding:0; background:#100c08; }
.widget { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 24px; background:#100c08; text-align:center; font-family:Courier New,monospace; }
.label { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#f5530a; margin-bottom:16px; }
h2 { font-size:28px; font-weight:400; color:#fff0e8; letter-spacing:2px; margin-bottom:12px; }
p { color:#a08070; font-size:13px; margin-bottom:36px; max-width:400px; line-height:1.7; }
#btn { display:inline-flex; align-items:center; gap:12px; background:#f5530a; color:#fff; font-family:Courier New,monospace; font-size:15px; font-weight:400; letter-spacing:2px; padding:16px 36px; border:none; border-radius:3px; cursor:pointer; transition:all .2s; text-transform:uppercase; }
#btn:hover { background:#ff7043; transform:translateY(-2px); box-shadow:0 8px 30px rgba(245,83,10,0.3); }
#btn.active { background:#cc3300; animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(245,83,10,0.4)} 50%{box-shadow:0 0 0 12px rgba(245,83,10,0)} }
.dot { width:10px; height:10px; background:#fff; border-radius:50%; display:inline-block; }
.dot.on { animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
#status { margin-top:20px; font-size:12px; color:#f5530a; letter-spacing:2px; min-height:20px; }
.note { margin-top:24px; font-size:11px; color:#604030; letter-spacing:1px; }
</style>
</head>
<body>
<div class="widget">
  <div class="label">Demo en directo</div>
  <h2>HABLA CON EL AGENTE</h2>
  <p>Pulsa el botón y habla directamente con nuestro agente de voz. Así es como funcionará en tu negocio.</p>
  <button id="btn" onclick="toggle()">
    <span class="dot" id="dot"></span>
    INICIAR LLAMADA
  </button>
  <div id="status"></div>
  <div class="note">Necesitas micrófono · Funciona en Chrome y Safari</div>
</div>
<script>
var vapi = null;
var active = false;

// ↓ CAMBIA AQUI TU PUBLIC KEY DE VAPI
var PUB_KEY = "TU_PUBLIC_KEY_AQUI";

// ↓ CAMBIA AQUI TU ASSISTANT ID
var ASST_ID = "6d120590-1381-4e5a-8a57-609cf57efbbe";

function toggle() { active ? stop() : start(); }

function start() {
  var btn = document.getElementById("btn");
  var status = document.getElementById("status");
  btn.innerHTML = "<span class='dot on' id='dot'></span> FINALIZAR LLAMADA";
  btn.classList.add("active");
  status.textContent = "CONECTANDO...";

  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@vapi-ai/web@latest/dist/vapi.js";
  s.onload = function() {
    try {
      vapi = new window.Vapi(PUB_KEY);
      vapi.on("call-start", function() {
        document.getElementById("status").textContent = "EN LLAMADA — Habla ahora";
        active = true;
      });
      vapi.on("call-end", function() { reset(); });
      vapi.on("error", function() {
        document.getElementById("status").textContent = "Error. Comprueba el microfono.";
        reset();
      });
      vapi.start(ASST_ID);
    } catch(e) {
      document.getElementById("status").textContent = "Error al iniciar.";
      reset();
    }
  };
  document.head.appendChild(s);
}

function stop() { if(vapi) vapi.stop(); reset(); }

function reset() {
  active = false;
  var btn = document.getElementById("btn");
  btn.classList.remove("active");
  btn.innerHTML = "<span class='dot' id='dot'></span> INICIAR LLAMADA";
  document.getElementById("status").textContent = "";
}
</script>
</body>
</html>
